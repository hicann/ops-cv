aipp_op{
    aipp_mode:static
    input_format : RGB888_U8

    src_image_size_w : 224
    src_image_size_h : 224

    crop: false
    load_start_pos_h : 0
    load_start_pos_w : 0
    crop_size_w : 224
    crop_size_h: 224

    padding: true
    left_padding_size: 32
    right_padding_size: 32
    top_padding_size: 32
    bottom_padding_size: 32
    padding_value: 255

    mean_chn_0 :128
    mean_chn_1 :128
    mean_chn_2 :128
    var_reci_chn_0: 0.00781
    var_reci_chn_1: 0.00781
    var_reci_chn_2: 0.00781
}