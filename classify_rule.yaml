        - ops/ops-cv/image/upsample_bicubic2d_aa/
        - ops/ops-cv/image/upsample_bicubic2d_aa_grad/
        - ops/ops-cv/image/upsample_bicubic2d_grad/
        - ops/ops-cv/image/upsample_bilinear2d/
